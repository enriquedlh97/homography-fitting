pipeline:
  mode: video_hybrid
  segmenter:
    type: sam2_image
    checkpoint: sam2/checkpoints/sam2.1_hiera_tiny.pt
    model_cfg: configs/sam2.1/sam2.1_hiera_t.yaml
  fitter:
    type: pca
    params:
      axis: short
  compositor:
    type: inpaint
    params:
      padding: 0.0
      lum_strength: 0.0
      shade_blend: true
      inpaint_radius: 1
      mask_dilate_px: 1
  tracking:
    ema_alpha: 0.01
  camera:
    focal_length: null
input:
  video: data/tennis-clip.mp4
  logo: data/logos/redbull_white.png
  prompts:
