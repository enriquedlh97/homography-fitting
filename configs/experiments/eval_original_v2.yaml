pipeline:
  mode: video_hybrid
  segmenter:
    type: sam2_image
    checkpoint: sam2/checkpoints/sam2.1_hiera_tiny.pt
    model_cfg: configs/sam2.1/sam2.1_hiera_t.yaml
  fitter:
    type: hull
  compositor:
    type: inpaint
    params:
      padding: 0.1
      lum_strength: 0.0
      shade_blend: false
      inpaint_method: median_fill
      mask_dilate_px: 20
      alpha_feather_px: 1
      quad_pad_px: 20
      local_color_match: true
      blend_mode: led
    surface_overrides:
      court_floor:
        padding: 0.0
        alpha_scale: 1.0
        alpha_feather_px: 5
        erase_text: true
        erase_dilate_px: 15
        erase_feather_px: 35
        shade_strength: 0.5
        occlusion_dilate_px: 10
        occlusion_feather_ksize: 21
        occlusion_feather_sigma: 4.0
      side_panel:
        inpaint_method: ns
        inpaint_radius: 3
        mask_dilate_px: 10
        inpaint_feather_px: 5
        local_color_match: false
        lum_strength: 0.0
  occlusion_masker:
    type: person
    confidence_threshold: 0.5
  tracking:
    corner_source: homography_offset
    ema_alpha: 0.7
  camera:
    focal_length: null
