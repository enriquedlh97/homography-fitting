pipeline:
  mode: video_hybrid
  segmenter:
    type: sam2_image
    checkpoint: sam2/checkpoints/sam2.1_hiera_tiny.pt
    model_cfg: configs/sam2.1/sam2.1_hiera_t.yaml
  fitter:
    type: hull
  compositor:
    type: inpaint
    params:
      padding: 0.1
      lum_strength: 0.0
      shade_blend: false
      inpaint_method: median_fill
      mask_dilate_px: 20
      alpha_feather_px: 1
      quad_pad_px: 20
      local_color_match: true
      blend_mode: led
    surface_overrides:
      court_floor:
        padding: 0.0
        alpha_scale: 1.0
        alpha_feather_px: 3
        erase_text: false
        shade_strength: 0.3
      side_panel:
        inpaint_method: ns
        inpaint_radius: 3
        mask_dilate_px: 10
        inpaint_feather_px: 5
        local_color_match: false
        lum_strength: 0.0
  occlusion_masker:
    type: person
    confidence_threshold: 0.5
  tracking:
    corner_source: bbox
  camera:
    focal_length: null
input:
  video: data/melbourne-walking-over-logo.mov
  logo: data/logos/redbull_white.png
  prompts:
  # === Back banner slots (visible in this clip) ===
  - obj_id: 1
    points:
    - - 537
      - 47
    - - 572
      - 34
    - - 599
      - 33
    labels: [1, 1, 1]
    box: [519, 22, 615, 56]
  - obj_id: 2
    points:
    - - 1122
      - 37
    labels: [1]
    box: [1109, 26, 1136, 50]
  # === Court floor: MELBOURNE (y=924-954) ===
  - obj_id: 3
    surface_type: court_floor
    points:
    - - 758
      - 939
    - - 957
      - 939
    - - 1117
      - 939
    labels: [1, 1, 1]
    box: [729, 920, 1188, 958]
  # === Court floor: YoPRO (left court) ===
  - obj_id: 4
    surface_type: court_floor
    points:
    - - 198
      - 611
    - - 285
      - 611
    - - 324
      - 611
    labels: [1, 1, 1]
    box: [180, 598, 346, 625]
output:
  dir: experiments/
