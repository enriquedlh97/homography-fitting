pipeline:
  mode: video
  segmenter:
    type: sam3_video
    checkpoint: sam3/checkpoints/sam3.1_multiplex.pt
  fitter:
    type: pca
    params:
      axis: short
  compositor:
    type: inpaint
    params:
      padding: 0.01
      lum_strength: 0.8
  camera:
    focal_length: null
  geometry:
    enabled: true
    court_backend: classical_lines_v1
    vp_smoothing_alpha: 0.7
    line_smoothing_alpha: 0.65
    hold_frames: 8
    fallback_after_frames: 3
    vp_confidence_min: 0.35
    tangent_margin_px: 2.0
  stabilization:
    enabled: true
    mode: hybrid
    static_motion_threshold_px: 0.75
    hold_corner_rms_px: 1.25
    mask_iou_gate: 0.55
    max_hold_frames: 6
    predicted_mask_weight: 0.65
    morph_kernel_px: 3
input:
  video: data/tennis-clip.mp4
  logo: data/logos/ferrari_white.png
  prompts:
  - obj_id: 2
    points:
    - - 899
      - 45
    - - 983
      - 43
    - - 963
      - 78
    labels:
    - 1
    - 1
    - 0
    surface_type: back_wall_banner
  - obj_id: 3
    points:
    - - 168
      - 286
    - - 196
      - 296
    labels:
    - 1
    - 0
    surface_type: side_wall_banner
  - obj_id: 4
    points:
    - - 693
      - 41
    - - 787
      - 49
    - - 741
      - 87
    labels:
    - 1
    - 1
    - 0
    surface_type: back_wall_banner
output:
  dir: experiments/
