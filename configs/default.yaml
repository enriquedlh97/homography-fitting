pipeline:
  mode: image
  segmenter:
    type: sam2_image
    checkpoint: sam2/checkpoints/sam2.1_hiera_tiny.pt
    model_cfg: configs/sam2.1/sam2.1_hiera_t.yaml
  fitter:
    type: pca
    params:
      axis: short
  compositor:
    type: inpaint
    params:
      padding: 0.05
      lum_strength: 0.8
  camera:
    focal_length: null
input:
  video: data/tennis-clip.mp4
  logo: data/logos/redbull_white.png
  prompts:
  - obj_id: 1
    points:
    - - 908
      - 52
output:
  dir: experiments/
